services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: charity
      POSTGRES_PASSWORD: charity
      POSTGRES_DB: charity_center
    ports: ["5432:5432"]
    volumes: [charity_pg_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charity -d charity_center"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  charity_pg_data:
